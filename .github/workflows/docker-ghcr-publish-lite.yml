name: Build and publish validator-lite image

# Build the CPU-only validator-lite image (Dockerfile.validator-lite)
# and push to ghcr.io/reliquadotai/reliquary-validator-lite on every
# commit to main.
#
# Image is python:3.12-slim + torch CPU + transformers + bittensor
# (no CUDA, no flash-attn). ~1.3 GB. Watchtower-friendly: hardcoded
# operator profile lives inside the image so external operators only
# set WALLET_NAME + HOTKEY_NAME at run time.
#
# Tags:
#   - latest        (only on main branch)
#   - sha-<short>   (every build, for pinned operator deploys)

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.validator-lite'
      - 'pyproject.toml'
      - 'reliquary_inference/**'
      - '.github/workflows/docker-ghcr-publish-lite.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push-lite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/reliquary-validator-lite
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.validator-lite
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
