global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.d/reliquary-alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: node
    static_configs:
      - targets: ["127.0.0.1:9100"]

  - job_name: reliquary_inference
    metrics_path: /metrics
    static_configs:
      - targets: ["__METRICS_TARGET__"]

  - job_name: reliquary_platform
    metrics_path: /metrics
    static_configs:
      - targets: ["__CONTROL_PLANE_TARGET__"]
